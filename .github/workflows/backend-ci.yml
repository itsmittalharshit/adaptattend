name: Backend CI

on:
  push:
    paths: ['backend/**']
  pull_request:
    paths: ['backend/**']

jobs:
  lint-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt ruff pytest pytest-asyncio

      - name: Lint
        run: ruff check app/

      - name: Tests
        run: pytest tests/ -v
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-key-32-characters-long
          FACE_ENCRYPTION_KEY: ${{ secrets.FACE_ENCRYPTION_KEY || 'AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=' }}
          RESEND_API_KEY: test
          FROM_EMAIL: test@test.com
          GOOGLE_CLIENT_ID: test
          GOOGLE_CLIENT_SECRET: test
          GOOGLE_REDIRECT_URI: http://localhost:8000/v1/auth/guest/gmail/callback
          SUPABASE_URL: http://localhost:54321
          SUPABASE_SERVICE_KEY: test
