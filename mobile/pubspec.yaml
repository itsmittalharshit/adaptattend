name: adaptattend
description: AdaptAttend — Smart attendance with QR, GPS, and face recognition.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.2.0

  # State management
  flutter_riverpod: ^2.5.1

  # Local database (SQLite via Drift)
  drift: ^2.18.0
  drift_flutter: ^0.2.2
  path_provider: ^2.1.3
  path: ^1.9.0

  # HTTP
  dio: ^5.4.3+1

  # Camera / image
  camera: ^0.10.5+9
  image_picker: ^1.1.0
  image: ^4.2.0

  # On-device face detection (Google ML Kit — no model download needed)
  google_mlkit_face_detection: ^0.11.0

  # TFLite face recognition (MobileFaceNet 128-d embeddings)
  tflite_flutter: ^0.12.0

  # Geolocation
  geolocator: ^12.0.0
  permission_handler: ^11.3.1

  # QR code display
  qr_flutter: ^4.1.0

  # Charts
  fl_chart: ^0.68.0

  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0

  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  crypto: ^3.0.3
  uuid: ^4.4.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.10
  drift_dev: ^2.18.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/models/
